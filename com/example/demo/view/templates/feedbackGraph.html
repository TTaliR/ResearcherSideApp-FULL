<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensor Feedback Over Time</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* Page-level styling */
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    /* Tooltip: floating info box shown on hover */
.tooltip {
  position: absolute;
  background: rgba(255, 255, 255, 0.95);
  border: 1px solid #888;
  border-radius: 6px;
  padding: 10px;
  box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
  font-size: 13px;
  line-height: 1.4;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  transform: translateY(-10px);
}

.detail-panel {
  position: absolute;
  display: none;
  width: min(560px, calc(100vw - 48px));
  max-height: 260px;
  overflow: auto;
  background: rgba(255, 255, 255, 0.98);
  border: 1px solid #9ca3af;
  border-radius: 6px;
  padding: 10px 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  font-size: 12px;
  line-height: 1.45;
  z-index: 10;
}

.detail-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.detail-panel-close {
  border: 0;
  background: #e5e7eb;
  color: #111827;
  border-radius: 4px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 3px 7px 5px;
}

.detail-panel-close:hover {
  background: #d1d5db;
}

.cluster-count {
  fill: #111827;
  font-size: 10px;
  font-weight: 700;
  text-anchor: middle;
  pointer-events: none;
}

    .legend {
      font-size: 12px;
    }

    /* The svg will size to the viewport container */
    svg {
      width: 100%;
      height: 650px;
    }

    /* Modern axis/grid styles */
    .axis path,
    .axis line {
      stroke: #333;
      stroke-width: 1.5px;
      shape-rendering: crispEdges;
    }

    .axis text {
      fill: #333;
      font-size: 13px;
      font-family: sans-serif;
    }

    .grid line {
      stroke: #ddd;
      stroke-opacity: 0.7;
      shape-rendering: crispEdges;
    }

    .grid path {
      stroke: none;
    }

    /* Rotated x-axis labels to prevent overlap */
    .x-axis text {
      text-anchor: end;
      transform: rotate(-45deg);
      transform-origin: center;
    }

    /* No data message styling */
    .no-alerts-message {
      text-anchor: middle;
      fill: #666;
      font-size: 16px;
      font-style: italic;
    }

    /* Zoom hint styling */
    .zoom-hint {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin-top: 5px;
    }

    /* Export button styling */
    .export-btn {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      background-color: #4682B4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .export-btn:hover {
      background-color: #3a6d96;
      transform: translateY(-1px);
    }

    .export-btn:active {
      transform: translateY(0);
    }

    .export-btn:disabled {
      background-color: #aaa;
      cursor: not-allowed;
      transform: none;
    }

    .graph-filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin: 8px 0 4px 0;
      font-size: 13px;
      color: #374151;
    }

    .graph-filters label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
  <h2>Sensor Feedback Over Time</h2>
  <!-- meta-info: shows which user and sensor the chart is for -->
  <h3 id="meta-info" style="text-align:center; margin-top: 0; font-weight: normal; color: #555;"></h3>

  <!-- data stats info -->
  <p id="data-stats" style="text-align:center; margin: 5px 0; font-size: 13px; color: #777;"></p>

  <!-- zoom hint for users -->
  <p class="zoom-hint">Tip: Use mouse scroll to zoom in/out on the timeline, drag to pan</p>

  <!-- graph visibility filters -->
  <div class="graph-filters" aria-label="Graph display filters">
    <label><input type="checkbox" id="toggleLine" checked> Show line graph</label>
    <label><input type="checkbox" id="toggleCircles" checked> Show pulses circles</label>
  </div>

  <!-- Export button -->
  <button id="exportBtn" class="export-btn">Save as PNG</button>

  <!-- main drawing surface -->
  <svg></svg>

  <!-- tooltip element updated by JS on hover -->
  <div class="tooltip"></div>
  <div class="detail-panel" id="detailPanel"></div>

  <script>
/*
  DATA_PLACEHOLDER -> replaced by the server/runtime with an array of objects
  Each data item expected shape (example):
    { time: "2023-01-01T12:00:00.000Z", value: 42, intensity: 120, pulses: 4, alert_type: "...", duration: 200, interval: 50 }
  USER_ID_PLACEHOLDER -> replaced with numeric/string user id
  SENSOR_TYPE_PLACEHOLDER -> replaced with string describing sensor
*/
const data = DATA_PLACEHOLDER;

// Parse timestamps from ISO string to Date objects (UTC)
const parseTime = d3.utcParse("%Y-%m-%dT%H:%M:%S.%LZ");
const formatTime = d3.timeFormat("%Y-%m-%d %H:%M");

if (!Array.isArray(data) || data.length === 0) {
  document.body.innerHTML = '<div style="font-family:sans-serif;text-align:center;padding:40px;color:#6b7280;">No data</div>';
  throw new Error("No chart data available");
}

const normalizedData = data
  .map(d => ({
    ...d,
    parsedTime: parseTime(d.time),
    value: d.value == null ? null : Number(d.value)
  }))
  .filter(d => d.parsedTime && d.value != null && !Number.isNaN(d.value));

if (normalizedData.length === 0) {
  document.body.innerHTML = '<div style="font-family:sans-serif;text-align:center;padding:40px;color:#6b7280;">No valid time/value points</div>';
  throw new Error("No valid chart points available");
}

const MAX_LINE_POINTS = 2400;
const MAX_VISIBLE_DOTS = 900;
const CLUSTER_CELL_PX = 22;

function downsampleTimeSeries(points, maxPoints) {
  if (!Array.isArray(points) || points.length <= maxPoints) {
    return points;
  }

  const result = [points[0]];
  const bucketSize = Math.ceil(points.length / Math.max(1, Math.floor(maxPoints / 2)));

  for (let i = 1; i < points.length - 1; i += bucketSize) {
    const bucket = points.slice(i, Math.min(i + bucketSize, points.length - 1));
    if (bucket.length === 0) {
      continue;
    }

    let minPoint = bucket[0];
    let maxPoint = bucket[0];
    bucket.forEach(point => {
      if (point.value < minPoint.value) minPoint = point;
      if (point.value > maxPoint.value) maxPoint = point;
    });

    if (minPoint.parsedTime <= maxPoint.parsedTime) {
      result.push(minPoint, maxPoint);
    } else {
      result.push(maxPoint, minPoint);
    }
  }

  result.push(points[points.length - 1]);
  return result
    .filter((point, index, array) => index === 0 || point !== array[index - 1])
    .sort((a, b) => a.parsedTime - b.parsedTime);
}

function clusterPoints(points, xScale, yScale) {
  if (!Array.isArray(points) || points.length <= MAX_VISIBLE_DOTS) {
    return points.map(point => ({
      ...point,
      points: [point],
      count: 1,
      maxPulses: point.pulses || 0,
      maxIntensity: point.intensity || 0
    }));
  }

  const buckets = new Map();
  points.forEach(point => {
    const cellX = Math.floor(xScale(point.parsedTime) / CLUSTER_CELL_PX);
    const cellY = Math.floor(yScale(point.value) / CLUSTER_CELL_PX);
    const key = `${cellX}:${cellY}`;
    if (!buckets.has(key)) {
      buckets.set(key, []);
    }
    buckets.get(key).push(point);
  });

  return Array.from(buckets.values()).map(group => {
    if (group.length === 1) {
      const point = group[0];
      return {
        ...point,
        points: [point],
        count: 1,
        maxPulses: point.pulses || 0,
        maxIntensity: point.intensity || 0
      };
    }

    const avgMs = d3.mean(group, d => d.parsedTime.getTime());
    const avgValue = d3.mean(group, d => d.value);
    const representative = group.reduce((best, point) => {
      const bestScore = (best.pulses || 0) + (best.intensity || 0) / 255;
      const pointScore = (point.pulses || 0) + (point.intensity || 0) / 255;
      return pointScore > bestScore ? point : best;
    }, group[0]);

    return {
      ...representative,
      parsedTime: new Date(avgMs),
      value: avgValue,
      points: group,
      count: group.length,
      maxPulses: d3.max(group, d => d.pulses || 0) || 0,
      maxIntensity: d3.max(group, d => d.intensity || 0) || 0
    };
  });
}

    // Basic meta values injected by runtime
    const userId = USER_ID_PLACEHOLDER; //
    const sensorType = SENSOR_TYPE_PLACEHOLDER;

    // Show basic context for the chart
    document.getElementById("meta-info").textContent = `User ID: ${userId} | Sensor: ${sensorType}`;

// Multi-scale time formatter - adapts to zoom level
const multiFormat = (date) => {
  if (d3.timeSecond(date) < date) return d3.timeFormat(".%L")(date);
  if (d3.timeMinute(date) < date) return d3.timeFormat(":%S")(date);
  if (d3.timeHour(date) < date) return d3.timeFormat("%H:%M")(date);
  if (d3.timeDay(date) < date) return d3.timeFormat("%H:%M")(date);
  if (d3.timeMonth(date) < date) return d3.timeFormat("%b %d")(date);
  if (d3.timeYear(date) < date) return d3.timeFormat("%B")(date);
  return d3.timeFormat("%Y")(date);
};

    // Prepare SVG + margins and compute inner drawing width/height
    const svg = d3.select("svg");
const margin = { top: 40, right: 200, bottom: 100, left: 100 };
    const width = svg.node().clientWidth - margin.left - margin.right;
    const height = svg.node().clientHeight - margin.top - margin.bottom;

    // Clip path prevents drawing outside axes area (important for zoom/pan)
svg.append("defs").append("clipPath")
  .attr("id", "clip")
  .append("rect")
  .attr("x", 0)
  .attr("y", 0)
  .attr("width", width)
  .attr("height", height);

// Main container group translated by margins
const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

// dataLayer is clipped so only line/circles are clipped (axes/legend are outside)
const dataLayer = g.append("g")
  .attr("clip-path", "url(#clip)");


    // X scale (time) and Y scale (value)
    const x = d3.scaleTime()
      .domain(d3.extent(normalizedData, d => d.parsedTime))
      .range([0, width]);

    const y = d3.scaleLinear()
    .domain([
        (() => {
            const minVal = d3.min(normalizedData, d => d.value);
            return minVal === 0 ? 0 : minVal - 10; // pad lower bound (unless zero)
        })(),
        d3.max(normalizedData, d => d.value) + 10 // add top padding
    ])
    .nice()
    .range([height, 0]);

    // Color mapping for intensity using thresholds
    const intensityThresholds = [20, 50, 100, 150, 200, 230, 255];
    const intensityColors = [
      "#fceabb",  // 0–20 → very light yellow
      "#f8c156",  // 21–50 → light orange
      "#f59e42",  // 51–100 → orange
      "#ec5e34",  // 101–150 → red-orange
      "#cd2e3a",  // 151–200 → red
      "#8e063b",  // 201–230 → dark red
      "#3b0a45"   // 231–255 → very dark purple
    ];
    const color = d3.scaleThreshold()
      .domain(intensityThresholds)
      .range(intensityColors);

    // Circle radius maps to pulses count (visual weight)
    const maxPulses = d3.max(data, d => d.pulses || 0) || 1;
    const radius = d3.scaleSqrt()
    .domain([0, maxPulses])
    .range([2, 10]);

    const tooltip = d3.select(".tooltip");
    const detailPanel = d3.select("#detailPanel");
    const closeDetailPanel = () => detailPanel.style("display", "none");
    document.addEventListener("click", event => {
      if (!event.target.closest("#detailPanel") && event.target.tagName.toLowerCase() !== "circle") {
        closeDetailPanel();
      }
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeDetailPanel();
      }
    });
        const toggleLine = document.getElementById("toggleLine");
        const toggleCircles = document.getElementById("toggleCircles");

        const graphVisibility = {
          line: toggleLine ? toggleLine.checked : true,
          circles: toggleCircles ? toggleCircles.checked : true
        };

        function applyGraphVisibility() {
          if (linePath) {
            linePath
              .attr("opacity", graphVisibility.line ? 1 : 0)
              .style("pointer-events", graphVisibility.line ? "auto" : "none");
          }

          dataLayer.selectAll("circle")
            .attr("opacity", graphVisibility.circles ? 1 : 0)
            .style("pointer-events", graphVisibility.circles ? "auto" : "none");
        }

        if (toggleLine) {
          toggleLine.addEventListener("change", (event) => {
            graphVisibility.line = !!event.target.checked;
            applyGraphVisibility();
          });
        }

        if (toggleCircles) {
          toggleCircles.addEventListener("change", (event) => {
            graphVisibility.circles = !!event.target.checked;
            applyGraphVisibility();
          });
        }

    // Calculate appropriate number of ticks based on width
    const tickCount = Math.max(4, Math.min(10, Math.floor(width / 120)));

    // X axis group with adaptive formatting
const xAxis = d3.axisBottom(x)
  .ticks(tickCount)
  .tickFormat(multiFormat);

const xAxisG = g.append("g")
  .attr("class", "axis x-axis")
  .attr("transform", `translate(0,${height})`)
  .call(xAxis);

// Rotate x-axis labels to prevent overlap
xAxisG.selectAll("text")
  .attr("transform", "rotate(-45)")
  .style("text-anchor", "end")
  .attr("dx", "-0.8em")
  .attr("dy", "0.15em");

// Show data statistics
const alertCount = normalizedData.filter(d => d.alert_type).length;
const timeRange = d3.extent(normalizedData, d => d.parsedTime);
const statsText = `${normalizedData.length} data points | ${alertCount} alerts | ` +
  `Range: ${d3.timeFormat("%b %d, %Y")(timeRange[0])} – ${d3.timeFormat("%b %d, %Y")(timeRange[1])}`;
document.getElementById("data-stats").textContent = statsText;

    // Y axis + gridlines
    g.append("g")
      .attr("class", "axis y-axis grid")
      .call(
        d3.axisLeft(y)
          .ticks(6)
          .tickSize(-width)
      );

    // Axis labels
    g.append("text")
      .attr("class", "axis-label y-axis-label")
      .attr("transform", "rotate(-90)")
      .attr("x", -height / 2)
      .attr("y", -60)
      .attr("text-anchor", "middle")
      .attr("fill", "#374151")
      .attr("font-size", "13px")
      .text("Value");

    g.append("text")
      .attr("class", "axis-label x-axis-label")
      .attr("x", width / 2)
      .attr("y", height + 65)
      .attr("text-anchor", "middle")
      .attr("fill", "#374151")
      .attr("font-size", "13px")
      .text("Time");

    // Line generator (monotone curve for smoothness)
    const line = d3.line()
      .defined(d => d.parsedTime && d.value != null && !Number.isNaN(d.value))
      .x(d => x(d.parsedTime))
      .y(d => y(d.value))
      .curve(d3.curveMonotoneX);

    const visualLineData = downsampleTimeSeries(normalizedData, MAX_LINE_POINTS);
    const alertSourceData = normalizedData.filter(d => d.pulses > 0 && d.alert_type);
    let renderedCircleData = clusterPoints(alertSourceData, x, y);

    // Draw a downsampled visual path; the original data array stays intact for export.
const linePath = dataLayer.append("path")
      .datum(visualLineData)
      .attr("fill", "none")
      .attr("stroke", "#4682B4")
      .attr("stroke-width", 2)
      .attr("d", line);

    // Animate stroke drawing for visual polish
    const totalLength = linePath.node().getTotalLength();

    linePath
      .attr("stroke-dasharray", totalLength + " " + totalLength)
      .attr("stroke-dashoffset", totalLength)
      .transition()
      .duration(2000)
      .ease(d3.easeLinear)
      .attr("stroke-dashoffset", 0);

    applyGraphVisibility();

    // Draw feedback circles only for points marked as alerts
    // Animated grow-in and staggered delays for clarity
dataLayer.selectAll("circle")
      .data(renderedCircleData)
      .enter().append("circle")
      .attr("cx", d => x(d.parsedTime))
      .attr("cy", d => y(d.value))
      .attr("r", 0)
      .attr("fill", d => color(d.intensity))
      .attr("stroke", "#333")
      .attr("opacity", 0)
      .transition()
      .duration(180)
      .delay((d, i) => Math.min(i * 3, 350))
      .attr("r", d => Math.max(radius(d.maxPulses || d.pulses), d.count > 1 ? 7 : 2))
      .attr("opacity", 1);

    dataLayer.selectAll("text.cluster-count")
      .data(renderedCircleData.filter(d => d.count > 1))
      .enter().append("text")
      .attr("class", "cluster-count")
      .attr("x", d => x(d.parsedTime))
      .attr("y", d => y(d.value) + 3)
      .text(d => d.count > 99 ? "99+" : d.count);

    applyGraphVisibility();

    // Re-select circles to add interactive hover handlers (tooltip + scale up)
dataLayer.selectAll("circle")
      .on("mouseover", function (event, d) {
        // Calculate tooltip position with edge-awareness
        const tooltipWidth = d.count > 1 ? 240 : 180;
        const tooltipHeight = d.count > 1 ? 170 : 140;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;

        let leftPos = event.pageX + 15;
        let topPos = event.pageY - 30;

        // Flip to left side if too close to right edge
        if (leftPos + tooltipWidth > viewportWidth - 20) {
          leftPos = event.pageX - tooltipWidth - 15;
        }
        // Flip below if too close to top
        if (topPos < 10) {
          topPos = event.pageY + 20;
        }
        // Adjust if too close to bottom
        if (topPos + tooltipHeight > viewportHeight - 10) {
          topPos = viewportHeight - tooltipHeight - 10;
        }

        // Show tooltip with key details
        tooltip
        .style("transform", "translateY(-10px)")
        .transition()
        .duration(200)
        .style("opacity", 1)
        .style("transform", "translateY(0px)");
    tooltip.html(
            d.count > 1
              ? `<strong>${d.count} aggregated alerts</strong><br>
                <strong>Time:</strong> ${formatTime(d3.min(d.points, p => p.parsedTime))} - ${formatTime(d3.max(d.points, p => p.parsedTime))}<br>
                <strong>Value range:</strong> ${d3.min(d.points, p => p.value)} - ${d3.max(d.points, p => p.value)}<br>
                <strong>Max intensity:</strong> ${d.maxIntensity}<br>
                <strong>Max pulses:</strong> ${d.maxPulses}<br>
                <strong>Click:</strong> show aggregated dots`
              : `<strong>Time:</strong> ${formatTime(d.parsedTime)}<br>
                <strong>Value:</strong> ${d.value ?? "N/A"}<br>
                <strong>Intensity:</strong> ${d.intensity}<br>
                <strong>Pulses:</strong> ${d.pulses}<br>
                <strong>Duration:</strong> ${d.duration || 0} ms<br>
                <strong>Interval:</strong> ${d.interval || 0} ms<br>
                <strong>Reason:</strong> ${d.reason || "N/A"}`
        )
          .style("left", leftPos + "px")
          .style("top", topPos + "px");

        // Highlight hovered circle (gentle scale)
        d3.select(this)
          .transition()
          .duration(150)
          .attr("r", Math.max(radius(d.maxPulses || d.pulses), d.count > 1 ? 7 : 2) * 1.3);
      })
      .on("mouseout", function (event, d) {
        // Hide tooltip and restore circle radius
        tooltip.transition().duration(200).style("opacity", 0);
        d3.select(this)
          .transition()
          .duration(200)
        .attr("r", Math.max(radius(d.maxPulses || d.pulses), d.count > 1 ? 7 : 2));
      })
      .on("click", function(event, d) {
        event.stopPropagation();
        if (!d.points || d.points.length <= 1) {
          closeDetailPanel();
          return;
        }

        const rows = d.points
          .slice()
          .sort((a, b) => a.parsedTime - b.parsedTime)
          .slice(0, 30)
          .map(point => `<div>${formatTime(point.parsedTime)} | value ${point.value ?? "N/A"} | intensity ${point.intensity ?? "N/A"} | pulses ${point.pulses ?? "N/A"}</div>`)
          .join("");
        const more = d.points.length > 30 ? `<div style="margin-top:6px;color:#6b7280;">Showing 30 of ${d.points.length} dots.</div>` : "";

        const panelWidth = Math.min(560, window.innerWidth - 48);

        detailPanel
          .html(`<div class="detail-panel-header"><strong>${d.points.length} aggregated dots</strong><button type="button" class="detail-panel-close" aria-label="Close aggregate details">&times;</button></div><div>${rows}${more}</div>`)
          .style("left", Math.max(12, Math.min(event.pageX + 12, window.innerWidth - panelWidth - 24)) + "px")
          .style("top", Math.max(10, Math.min(event.pageY + 12, window.innerHeight - 290)) + "px")
          .style("display", "block");

        detailPanel.select(".detail-panel-close").on("click", closeDetailPanel);
      });

    // Show message if data exists but no alerts to display
    const alertsToShow = alertSourceData;
    if (data.length > 0 && alertsToShow.length === 0) {
      dataLayer.append("text")
        .attr("class", "no-alerts-message")
        .attr("x", width / 2)
        .attr("y", height / 2)
        .text("No feedback alerts in this time range. Only the data line is shown.");
    }

    // Legend: explain color (intensity) and size (pulses)
    const legend = svg.append("g")
      .attr("class", "legend")
      .attr("transform", `translate(${width + margin.left + 20},${margin.top})`);

    legend.append("text").text("Intensity (Color)").attr("font-weight", "bold");

    // Render intensity legend entries (threshold ranges)
    const legendThresholds = [0, ...intensityThresholds];
    legendThresholds.forEach((v, i) => {
      if (i < intensityColors.length) {
        const rangeEnd = intensityThresholds[i] ?? 255;
        const rangeLabel = `${v}–${rangeEnd}`;

        legend.append("rect")
          .attr("x", 0)
          .attr("y", 20 + i * 14)
          .attr("width", 20)
          .attr("height", 12)
          .attr("fill", intensityColors[i]);

        legend.append("text")
          .attr("x", 30)
          .attr("y", 30 + i * 14)
          .attr("font-size", "11px")
          .text(rangeLabel);
      }
    });

    // Pulses size legend: demonstrates mapping from count -> circle radius
    legend.append("text").text("Pulses (Size)").attr("y", 130).attr("font-weight", "bold");
const pulseValues = [2, 4, 6, 8, 10];
let currentY = 150; // starting y-position for pulse legend entries
const pulsePadding = 6; // gap between legend circles
pulseValues.forEach((v) => {
  const r = radius(v);

  legend.append("circle")
    .attr("cx", 10)
    .attr("cy", currentY + r)
    .attr("r", r)
    .attr("fill", "#999");

  legend.append("text")
    .attr("x", 30)
    .attr("y", currentY + r + 4) // text slightly below circle center
    .text(v);

  currentY += 2 * r + pulsePadding; // move down for next circle
});

    // Zoom behavior: allows pan + zoom on x-axis while keeping y fixed
const zoom = d3.zoom()
  .scaleExtent([1, 100]) // min/max zoom scales
  .translateExtent([[-width, 0], [2 * width, height]]) // allow panning beyond initial bounds
  .extent([[0, 0], [width, height]])
  .on("zoom", zoomed);

svg.call(zoom);

// Prevent automatic zoom on double-click (optional UX preference)
svg.on("dblclick.zoom", null);

// Called on zoom/pan events. Updates x-axis, line path, and circle x positions.
function zoomed(event) {
  const transform = event.transform;
  const zx = transform.rescaleX(x);

  // Update the X axis with the transformed scale and adaptive formatting
  const zoomedTickCount = Math.max(4, Math.min(12, Math.floor(width / 100)));
  xAxisG.call(d3.axisBottom(zx).ticks(zoomedTickCount).tickFormat(multiFormat));

  // Re-apply rotation to x-axis labels after zoom update
  xAxisG.selectAll("text")
    .attr("transform", "rotate(-45)")
    .style("text-anchor", "end")
    .attr("dx", "-0.8em")
    .attr("dy", "0.15em");

  // Recompute the line path using the rescaled x
  const lineWithZoom = d3.line()
    .defined(d => d.parsedTime && d.value != null && !Number.isNaN(d.value))
    .x(d => zx(d.parsedTime))
    .y(d => y(d.value))
    .curve(d3.curveMonotoneX);

  // Remove the stroke-dasharray animation when zooming to prevent line disappearing
  linePath
    .attr("stroke-dasharray", null)
    .attr("stroke-dashoffset", null)
    .datum(visualLineData)
    .attr("d", lineWithZoom);

  // Move circles horizontally according to zoom/pan
  dataLayer.selectAll("circle")
    .attr("cx", d => zx(d.parsedTime));

  dataLayer.selectAll("text.cluster-count")
    .attr("x", d => zx(d.parsedTime));
}

// ==================== EXPORT TO PNG ====================
/**
 * Exports the current SVG chart to a PNG image file.
 * Opens a new window with the image and instructions to save it.
 */
function exportToPng() {
  const exportBtn = document.getElementById('exportBtn');
  const originalText = exportBtn.textContent;

  // Show loading state
  exportBtn.disabled = true;
  exportBtn.textContent = 'Generating...';

  try {
    const svgElement = document.querySelector('svg');
    const svgRect = svgElement.getBoundingClientRect();

    // Clone SVG to avoid modifying the original
    const svgClone = svgElement.cloneNode(true);

    // Set explicit dimensions on the clone
    svgClone.setAttribute('width', svgRect.width);
    svgClone.setAttribute('height', svgRect.height);

    // Add white background to SVG
    const bgRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bgRect.setAttribute('width', '100%');
    bgRect.setAttribute('height', '100%');
    bgRect.setAttribute('fill', 'white');
    svgClone.insertBefore(bgRect, svgClone.firstChild);

    // Serialize SVG to string
    const serializer = new XMLSerializer();
    let svgString = serializer.serializeToString(svgClone);

    // Encode SVG for use in image source
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    // Extract header information from page
    const titleText = document.querySelector('h2').textContent;
    const metaInfoText = document.getElementById('meta-info').textContent;
    const dataStatsText = document.getElementById('data-stats').textContent;

    // Header dimensions and layout
    const headerHeight = 90;
    const headerPadding = 15;
    const lineHeight = 22;

    // Create canvas with extra height for header
    const canvas = document.createElement('canvas');
    const scale = 2; // Higher resolution for better quality
    canvas.width = svgRect.width * scale;
    canvas.height = (svgRect.height + headerHeight) * scale;

    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width / scale, canvas.height / scale);

    // Draw header text on canvas
    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(titleText, headerPadding, headerPadding);

    ctx.font = '13px sans-serif';
    ctx.fillStyle = '#555';
    ctx.fillText(metaInfoText, headerPadding, headerPadding + lineHeight);

    ctx.fillStyle = '#777';
    ctx.font = '12px sans-serif';
    ctx.fillText(dataStatsText, headerPadding, headerPadding + lineHeight * 2);

    // Draw separator line below header
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, headerHeight - 5);
    ctx.lineTo(canvas.width / scale, headerHeight - 5);
    ctx.stroke();

    const img = new Image();

    img.onload = function() {
      // Draw SVG image below the header (offset by headerHeight)
      ctx.drawImage(img, 0, headerHeight);
      URL.revokeObjectURL(url);

      // Generate filename with timestamp
      const now = new Date();
      const timestamp = now.toISOString().slice(0, 19).replace(/[:-]/g, '');
      const filename = `sensor_chart_user${userId}_${sensorType}_${timestamp}.png`;

      // Get base64 data URL
      const dataUrl = canvas.toDataURL('image/png');

      // Send export payload to JavaFX through window.alert handler.
      try {
        const payload = JSON.stringify({ type: 'png-export', filename, dataUrl });
        alert(`__GRAPH_EXPORT__${payload}`);
      } catch (e) {
        console.error('Export bridge payload error:', e);
        alert('Export failed. Please try again.');
      }

      exportBtn.disabled = false;
      exportBtn.textContent = originalText;
    };

    img.onerror = function() {
      console.error('Failed to load SVG for export');
      URL.revokeObjectURL(url);
      exportBtn.disabled = false;
      exportBtn.textContent = 'Export failed - try again';
      setTimeout(() => {
        exportBtn.textContent = originalText;
      }, 2000);
    };

    img.src = url;

  } catch (error) {
    console.error('Export error:', error);
    exportBtn.disabled = false;
    exportBtn.textContent = 'Export failed';
    setTimeout(() => {
      exportBtn.textContent = originalText;
    }, 2000);
  }
}

// Attach export button click handler
document.getElementById('exportBtn').addEventListener('click', exportToPng);
  </script>
